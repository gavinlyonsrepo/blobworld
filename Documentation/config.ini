# Blob World configuration
# Edit this file to customise the game.
# Delete it to restore all defaults.

[display]
# screen resolution
screen_w = 1280
screen_h = 720
fps = 60
fullscreen = false

[gameplay]
# blob counts (fixed pools)
green_count = 15
purple_count = 4
# player settings
player_speed = 4.0
# how much purple shrinks the player per touch
purple_shrink = 3.0
# seconds reds are frozen after catching yellow
yellow_freeze_seconds = 3.0
# scoring
score_per_green = 5
score_per_yellow = 25

[audio]
# volume range 0.0 to 1.0
music_volume = 0.5
sfx_volume = 0.8
